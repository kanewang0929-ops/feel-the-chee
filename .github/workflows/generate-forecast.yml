name: Generate full-history forecast

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/generate_forecast.py"
      - "data/draws.json"
      - ".github/workflows/generate-forecast.yml"
  schedule:
    - cron: "20 14 * * 1,3,6"

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate forecast
        run: python scripts/generate_forecast.py

      - name: Commit forecast when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/forecast.json
          if git diff --cached --quiet; then
            echo "Forecast unchanged"
          else
            git commit -m "data: refresh full-history AI forecast"
            git push
          fi
