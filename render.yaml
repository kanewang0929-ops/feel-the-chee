services:
  - type: web
    name: feel-the-chee
    runtime: static
    buildCommand: echo "Static site ready"
    staticPublishPath: .
    autoDeployTrigger: commit
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
